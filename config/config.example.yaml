providers:
  portfolio:
    type: hybrid
    coin_type: upbit
    equity_type: kis
    fallback_to_config: true
  price:
    type: upbit
    coin_gecko_ids:
      BTC: bitcoin
      ETH: ethereum
      LINK: chainlink
      AAVE: aave
      ARB: arbitrum
    fallback_prices:
      BTC: 119682994
      ETH: 3520000
      LINK: 14320
      AAVE: 137900
      ARB: 178
  news:
    type: rss
    llm_enabled: true
    lookback_hours: 24
    max_items: 5
    max_items_per_query: 5
    snapshot_path: snapshots/news_state.json
    queries:
      - 비트코인 이더리움 가상자산
      - 미국 증시 나스닥 S&P500 연준 금리
      - 금 가격 달러 안전자산
      - 원전 SMR 원자력
      - 휴머노이드 로봇 AI
      - 리츠 부동산 금리
      - 미국 국채 10년물 채권
      - 한국 부동산 아파트 전세

alerts:
  price_change_threshold_percent: 5
  weight_deviation_threshold_pct: 5
  total_coin_weight_limit: 0.60

